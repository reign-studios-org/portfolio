<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/public/favicon.png" />

    <!-- Title -->
    <title>Reign Studios</title>

    <!-- Primary SEO -->
    <meta name="title" content="Reign Studios" />
    <meta
      name="description"
      content="REIGN STUDIOS is a next-generation Roblox development team focused
            on building ambitious, high-impact experiences designed to stand
            apart."
    />
    <meta
      name="keywords"
      content="Reign Studios, Enchanted Roblox, Reign Piece Roblox, MarkusVFX"
    />
    <meta name="author" content="Slyckster" />

    <!-- Open Graph (Facebook, Discord, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://reign-studios-org.github.io/"
    />
    <meta property="og:title" content="Reign Studios" />
    <meta
      property="og:description"
      content="REIGN STUDIOS is a next-generation Roblox development team focused
            on building ambitious, high-impact experiences designed to stand
            apart."
    />
    <meta
      property="og:image"
      content="https://reign-studios-org.github.io/favicon.png"
    />

    <!-- Twitter Card (forces side image layout) -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Reign Studios" />
    <meta
      name="twitter:description"
      content="REIGN STUDIOS is a next-generation Roblox development team focused
            on building ambitious, high-impact experiences designed to stand
            apart."
    />
    <meta
      name="twitter:image"
      content="https://reign-studios-org.github.io/favicon.png"
    />

    <!-- Canonical URL -->
    <link
      rel="canonical"
      href="https://reign-studios-org.github.io/"
    />

    <!-- Theme color (mobile browser UI) -->
    <meta name="theme-color" content="#0f172a" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Theme -->
    <meta name="theme-color" content="#0f0f12" />

    <!-- SEO Control -->
    <meta name="robots" content="index, follow" />
    <link
      rel="canonical"
      href="https://reign-studios-org.github.io/"
    />

    <!-- Structured Data (Organization) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Reign Studios",
        "url": "https://reign-studios-org.github.io/",
        "logo": "https://reign-studios-org.github.io/favicon.png",
        "description": "REIGN STUDIOS is a next-generation Roblox development team focused
            on building ambitious, high-impact experiences designed to stand
            apart.",
        "sameAs": []
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
