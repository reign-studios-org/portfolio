<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title -->
    <title>Reign Studio</title>

    <!-- Primary SEO -->
    <meta name="title" content="Reign Studio" />
    <meta name="description" content="Reign Studio is a Roblox game development organization dedicated to creating high-quality, immersive experiences. We build polished, engaging games with strong design, performance, and player-focused gameplay." />
    <meta name="keywords" content="Reign Studio, Roblox game developer, Roblox studio, game development, high quality Roblox games, Roblox games, immersive games" />
    <meta name="author" content="Reign Studio" />

    <!-- Favicon (GitHub Pages safe path) -->
    <link rel="icon" type="image/png" href="/public/favicon.png" />

    <!-- Open Graph (Facebook, Discord, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://reign-studios-org.github.io/portfolio/" />
    <meta property="og:title" content="Reign Studio | Roblox Game Development Studio" />
    <meta property="og:description" content="Creating high-quality Roblox games with immersive design, polished gameplay, and engaging player experiences." />
    <meta property="og:image" content="https://reign-studios-org.github.io/portfolio/preview.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://reign-studios-org.github.io/portfolio/" />
    <meta name="twitter:title" content="Reign Studio | Roblox Game Development Studio" />
    <meta name="twitter:description" content="High-quality Roblox games built with creativity, performance, and player-first design." />
    <meta name="twitter:image" content="https://reign-studios-org.github.io/portfolio/preview.png" />

    <!-- Theme -->
    <meta name="theme-color" content="#0f0f12" />

    <!-- SEO Control -->
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://reign-studios-org.github.io/portfolio/" />

    <!-- Structured Data (Organization) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Reign Studio",
      "url": "https://reign-studios-org.github.io/portfolio/",
      "logo": "https://reign-studios-org.github.io/portfolio/favicon.png",
      "description": "Reign Studio is a Roblox game development organization focused on creating high-quality, immersive gaming experiences.",
      "sameAs": []
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
